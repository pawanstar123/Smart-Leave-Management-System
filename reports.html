        <div class="table-container">
            <h3>Generate Report</h3>

            <form>
                <label>Select Month</label>

        <!-- Report Table -->
        <div class="table-container">
            <h3>Leave Report</h3>

            <table>
                <tr>
                    <th>Name</th>
                    <th>Total Leaves</th>
