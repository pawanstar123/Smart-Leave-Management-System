<!DOCTYPE html>
<!-- §2.2.2 Student: Apply for leave by selecting leave type, dates, and reason -->
<!-- §2.2.7 Error Handling: validation errors shown inline (missing fields, bad dates) -->
<!-- §2.2.5 Leave Workflow: submitted leave enters pipeline with status 'Pending' -->
<!-- RTM: FR-02 (D-ARCH-02, D-DB-01) | NFR-03 (D-DB-04) | NFR-05 (D-ARCH-05) -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Leave — LeaveOk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="28">
                <circle cx="20" cy="20" r="18" fill="#4facfe" opacity="0.15"/>
                <path d="M10 20 L16 26 L30 12" stroke="#4facfe" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Leave<span class="brand-dot">Ok</span></span>
        </div>
        <nav>
            <a href="/user/dashboard"><span class="nav-icon">⊞</span> Dashboard</a>
            <a href="/user/apply_leave" class="active"><span class="nav-icon">＋</span> Apply Leave</a>
            <a href="/user/leave_history"><span class="nav-icon">☰</span> Leave History</a>
            <a href="/user/leave_status"><span class="nav-icon">◎</span> Leave Status</a>
            <a href="/user/profile"><span class="nav-icon">👤</span> Profile</a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout"><span class="nav-icon">⏻</span> Logout</a>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <h1>Apply Leave</h1>
        </div>
        <div class="content">
            <div class="form-card">
                <h3>New Leave Application</h3>
                {% if error %}
                <div style="background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;">{{ error }}</div>
                {% endif %}
                <form method="POST" action="/user/apply_leave" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>Leave Type</label>
                        <select name="leave_type" required>
                            <option value="">Select leave type</option>
                            <option value="Sick Leave">Sick Leave</option>
                            <option value="Casual Leave">Casual Leave</option>
                            <option value="Emergency Leave">Emergency Leave</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>From Date</label>
                        <!-- min set by JS below to today — past dates are disabled -->
                        <input type="date" name="from_date" id="from_date" required>
                    </div>
                    <div class="form-group">
                        <label>To Date</label>
                        <!-- min kept in sync with From Date via JS -->
                        <input type="date" name="to_date" id="to_date" required>
                    </div>
                    <div class="form-group">
                        <label>Reason</label>
                        <textarea name="reason" placeholder="Describe the reason for your leave..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Supporting Document <span style="color:#94a3b8;font-weight:400;font-size:12px;">(optional, PDF only)</span></label>
                        <input type="file" name="document" accept=".pdf" style="padding:8px;">
                        <div style="font-size:11px;color:#64748b;margin-top:4px;">Upload a medical certificate or other supporting document if required.</div>
                    </div>
                    <button type="submit" class="btn btn-blue">Submit Application</button>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    // Enforce today as minimum date for both pickers — past dates are not selectable
    var today = new Date().toISOString().split('T')[0];
    var fromInput = document.getElementById('from_date');
    var toInput   = document.getElementById('to_date');

    fromInput.min = today;
    toInput.min   = today;

    // When From Date changes, keep To Date min in sync so To can't be before From
    fromInput.addEventListener('change', function () {
        toInput.min = fromInput.value || today;
        if (toInput.value && toInput.value < fromInput.value) {
            toInput.value = fromInput.value;
        }
    });
</script>
</body>
</html>
