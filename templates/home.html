<!DOCTYPE html>
<html>

<head>

    <title>Smart Leave Management System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {

            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 350px;

        }

        h1 {

            color: #2c3e50;
            margin-bottom: 10px;

        }

        p {

            color: gray;
            margin-bottom: 30px;

        }

        button {

            width: 140px;
            padding: 12px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;

        }

        .login {

            background: #5dade2;
            color: white;

        }

        .register {

            background: white;
            border: 2px solid #5dade2;
            color: #5dade2;

        }

        .login:hover {

            background: #3498db;

        }

        .register:hover {

            background: #5dade2;
            color: white;

        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Smart Leave Management</h1>

        <p>Manage leaves easily and efficiently</p>

        <a href="/login">
            <button class="login">
                Login
            </button>
        </a>

        <a href="/register">
            <button class="register">
                Register
            </button>
        </a>

    </div>

</body>

</html>
