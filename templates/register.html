<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — LeaveOk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" width="180">
                <circle cx="36" cy="40" r="30" fill="#4facfe" opacity="0.12"/>
                <path d="M18 40 L30 52 L54 28" stroke="#4facfe" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <text x="72" y="54" fill="#0f172a" font-family="Segoe UI,Arial,sans-serif" font-size="42" font-weight="700">Leave</text>
                <text x="198" y="54" fill="#4facfe" font-family="Segoe UI,Arial,sans-serif" font-size="42" font-weight="700">Ok</text>
            </svg>
        </div>
        <h2>Create account</h2>

        <form method="POST" action="/register">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter your full name" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Create a password" required>

            <label>Role</label>
            <select name="role">
                <option value="Student">Student</option>
                <option value="Faculty">Faculty</option>
                <option value="Admin">Admin</option>
            </select>

            <button type="submit" class="btn-primary">Register</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Login</a>
        </div>
    </div>
</body>
</html>
