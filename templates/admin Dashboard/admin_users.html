<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users — LeaveOk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="28">
                <circle cx="20" cy="20" r="18" fill="#4facfe" opacity="0.15"/>
                <path d="M10 20 L16 26 L30 12" stroke="#4facfe" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Leave<span class="brand-dot">Ok</span></span>
        </div>
        <nav>
            <a href="/admin/dashboard"><span class="nav-icon">⊞</span> Dashboard</a>
            <a href="/admin/users" class="active"><span class="nav-icon">👥</span> Users</a>
            <a href="/admin/leaves"><span class="nav-icon">☰</span> Leaves</a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout"><span class="nav-icon">⏻</span> Logout</a>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <h1>Users</h1>
        </div>
        <div class="content">
            <div class="table-card">
                <div class="table-card-header">
                    <h3>All Registered Users</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in users %}
                        <tr>
                            <td>{{ user[0] }}</td>
                            <td>{{ user[1] }}</td>
                            <td>{{ user[2] }}</td>
                            <td><span class="badge badge-approved">{{ user[3] }}</span></td>
                        </tr>
                        {% else %}
                        <tr class="empty-row"><td colspan="4">No users found.</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
